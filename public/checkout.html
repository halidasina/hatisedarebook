<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beli Sekarang — Hati Sedar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #FDFAF4;
      color: #2C2416;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border: 0.5px solid rgba(196,151,90,0.3);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 32px rgba(44,36,22,0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-brand {
      font-size: 11px;
      letter-spacing: 3px;
      color: #C4975A;
      margin-bottom: 4px;
    }

    .logo-title {
      font-size: 20px;
      font-weight: 300;
      color: #2C2416;
      letter-spacing: 1px;
    }

    .price-badge {
      background: #2C2416;
      color: #C4975A;
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
      margin-bottom: 28px;
    }

    .price-badge .amount {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .price-badge .label {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(196,151,90,0.7);
      margin-top: 2px;
    }

    h2 {
      font-size: 15px;
      font-weight: 500;
      color: #2C2416;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: #9A7040;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(196,151,90,0.35);
      border-radius: 10px;
      font-size: 14px;
      color: #2C2416;
      background: #FDFAF4;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #C4975A;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #C4975A;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
      letter-spacing: 0.5px;
    }

    .btn:hover { background: #a97d45; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .note {
      font-size: 12px;
      color: #9B8E7A;
      text-align: center;
      margin-top: 16px;
      line-height: 1.6;
    }

    .error {
      background: #fff0ee;
      border: 1px solid #f5c6c0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c0392b;
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-brand">HATI SEDAR</div>
      <div class="logo-title">Muhasabah Journal</div>
    </div>

    <div class="price-badge">
      <div class="amount">RM14.90</div>
      <div class="label">AKSES SEUMUR HIDUP</div>
    </div>

    <h2>Masukkan maklumat anda</h2>

    <div class="error" id="errMsg"></div>

    <form id="checkoutForm">
      <div class="field">
        <label>NAMA PENUH</label>
        <input type="text" id="name" placeholder="Contoh: Ahmad bin Ali" required autocomplete="name" />
      </div>
      <div class="field">
        <label>EMEL</label>
        <input type="email" id="email" placeholder="Contoh: ahmad@gmail.com" required autocomplete="email" />
      </div>
      <button type="submit" class="btn" id="submitBtn">Teruskan ke Pembayaran →</button>
    </form>

    <p class="note">
      Selepas bayaran berjaya, maklumat log masuk akan dihantar ke emel anda secara automatik.
    </p>
  </div>

  <script>
    document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const errMsg = document.getElementById('errMsg');
      const btn = document.getElementById('submitBtn');

      errMsg.style.display = 'none';

      if (!name || !email) {
        errMsg.textContent = 'Sila isi nama dan emel anda.';
        errMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Menyediakan pembayaran...';

      try {
        const res = await fetch('/.netlify/functions/create-bill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email }),
        });

        const data = await res.json();

        if (!res.ok || !data.url) {
          throw new Error(data.error || 'Ralat semasa menyediakan pembayaran.');
        }

        window.location.href = data.url;
      } catch (err) {
        errMsg.textContent = err.message;
        errMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Teruskan ke Pembayaran →';
      }
    });
  </script>
</body>
</html>
